<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-info">
                <img src="./assets/images/logo-main.png" alt="Logo de Character Counter">
                <p>Character Counter</p>
            </div>
            <button type="button" class="sun-button">
                <img src="./assets/images/logo-sun.png" alt="Cambiar tema">
            </button>
        </header>
        <main>
            <h1>Analyze your text in real-time.</h1>
            <textarea class="text-area">Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>
            <div class="text-area-info">
                <div class="checkboxes">
                    <label>
                        <input type="checkbox">
                        Exclude Spaces
                    </label>
                    <label>
                        <input type="checkbox">
                        Set Character Limit
                    </label>
                </div>
                <p>Approx. reading time: &lt;1 minute</p>
            </div>
            <section class="stats">
                <div class="card total-characters">
                    <p>278</p>
                    <p>Total Characters</p>
                </div>
                <div class="card word-count">
                    <p>39</p>
                    <p>Word Count</p>
                </div>
                <div class="card sentence-count">
                    <p>04</p>
                    <p>Sentence Count</p>
                </div>
            </section>
            <section class="letter-density">
                <h2>Letter Density</h2>
                <div class="letter-row">
                    <span class="letter">E</span>
                    <div class="bar">
                        <div class="fill fill-16-06"></div>
                    </div>
                    <span class="value">40 (16.06%)</span>
                </div>
                <div class="letter-row">
                    <span class="letter">I</span>
                    <div class="bar">
                        <div class="fill fill-11-65"></div>
                    </div>
                    <span class="value">29 (11.65%)</span>
                </div>
                <div class="letter-row">
                    <span class="letter">T</span>
                    <div class="bar">
                        <div class="fill fill-11-24"></div>
                    </div>
                    <span class="value">28 (11.24%)</span>
                </div>
                <div class="letter-row">
                    <span class="letter">O</span>
                    <div class="bar">
                        <div class="fill fill-8-84"></div>
                    </div>
                    <span class="value">22 (8.84%)</span>
                </div>
                <div class="letter-row">
                    <span class="letter">N</span>
                    <div class="bar">
                        <div class="fill fill-8-43"></div>
                    </div>
                    <span class="value">21 (8.43%)</span>
                </div>
                <button type="button">
                    See more
                    <img src="./assets/images/logo-down-arrow.png" alt="Expandir">
                </button>
            </section>
        </main>
    </div>
</body>

</html>
